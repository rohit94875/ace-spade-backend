server.port=8080

# MySQL
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/acespade?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:acespade}
spring.datasource.password=${MYSQL_PASSWORD:acespade123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2000ms

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JWT
ace.jwt.secret=${JWT_SECRET:ace-spade-dev-secret-change-in-production-min-32-chars}
ace.jwt.access-expiration-ms=900000
ace.jwt.refresh-expiration-ms=604800000

# Logging
logging.level.com.acespade=DEBUG
logging.level.org.springframework.web.socket=INFO
